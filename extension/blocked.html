<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RU</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 440px;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      text-align: center;
    }

    .dot {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(22, 27, 34, 0.93);
      border: 1px solid rgba(136, 176, 225, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    .dot-label {
      color: #88b0e1;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .site-name {
      color: #484f58;
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    /* SOFT MODE */
    #soft-content { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }

    .heading {
      font-size: 22px;
      font-weight: 300;
      color: #e6edf3;
      line-height: 1.4;
    }

    .sub {
      color: #6e7681;
      font-size: 14px;
      line-height: 1.6;
    }

    .prompt-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: rgba(22, 27, 34, 0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 16px;
    }

    .chevron { color: #88b0e1; font-size: 16px; flex-shrink: 0; }

    .prompt-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e6edf3;
      font-size: 14px;
      font-family: inherit;
    }

    .prompt-input::placeholder { color: #484f58; }

    .btn-start {
      width: 100%;
      padding: 12px;
      background: #88b0e1;
      border: none;
      border-radius: 10px;
      color: #0d1117;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-start:hover { opacity: 0.85; }
    .btn-start:disabled { opacity: 0.3; cursor: default; }

    .bypass-row {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #30363d;
      font-size: 12px;
    }

    .bypass-link {
      color: #484f58;
      cursor: pointer;
      text-decoration: underline;
      transition: color 0.15s;
    }
    .bypass-link:hover { color: #6e7681; }

    /* HARD MODE */
    #hard-content { display: none; flex-direction: column; align-items: center; gap: 16px; }

    .hard-heading {
      font-size: 22px;
      font-weight: 300;
      color: #e6edf3;
    }

    .hard-sub {
      color: #6e7681;
      font-size: 14px;
      line-height: 1.6;
    }

    .session-badge {
      background: rgba(136, 176, 225, 0.1);
      border: 1px solid rgba(136, 176, 225, 0.2);
      border-radius: 20px;
      padding: 6px 16px;
      color: #88b0e1;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="dot"><span class="dot-label">RU</span></div>
    <div class="site-name" id="site-name"></div>

    <!-- Soft block -->
    <div id="soft-content">
      <div class="heading">RU avoiding something?</div>
      <div class="sub">Type your first step and start a session instead.</div>
      <div class="prompt-row">
        <span class="chevron">›</span>
        <input class="prompt-input" id="first-step" placeholder="what's your first step?" autocomplete="off" />
      </div>
      <button class="btn-start" id="btn-start" disabled>Start 90 seconds</button>
      <div class="bypass-row">
        or <span class="bypass-link" id="btn-bypass">go to site anyway</span>
      </div>
    </div>

    <!-- Hard block -->
    <div id="hard-content">
      <div class="session-badge">Session in progress</div>
      <div class="hard-heading">Stay with it.</div>
      <div class="hard-sub">You started a session. This site is blocked until your timer ends.</div>
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
