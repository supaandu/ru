<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      overflow: hidden;
      width: 220px;
      height: 480px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .icon-wrap {
      width: 54px;
      height: 54px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.25;
      transition: opacity 0.5s ease;
      cursor: pointer;
    }
    .icon-wrap:hover { opacity: 1; }

    .icon-dot {
      width: 46px;
      height: 46px;
      background: rgba(22, 27, 34, 0.93);
      border: 1px solid rgba(136, 176, 225, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
    }

    .icon-label {
      color: #88b0e1;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .card {
      display: none;
      background: rgba(22, 27, 34, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      padding: 16px 18px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      width: 210px;
      margin-top: 4px;
    }

    /* Score */
    .score-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .score-label {
      color: #484f58;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .score-value {
      font-size: 38px;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      color: #e6edf3;
      line-height: 1;
    }
    .score-max { color: #484f58; font-size: 13px; margin-left: 2px; }

    .score-bar-track {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      margin-bottom: 14px;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: #88b0e1;
      transition: width 0.4s ease;
    }

    /* Metrics */
    .metrics {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 14px;
    }
    .metric { display: flex; justify-content: space-between; align-items: baseline; }
    .metric-label { color: #484f58; font-size: 11px; }
    .metric-value { color: #8b949e; font-size: 12px; font-variant-numeric: tabular-nums; }
    .metric-unit { color: #30363d; font-size: 10px; margin-left: 2px; }
    .bail-value { color: #f85149; }

    /* Divider */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 12px 0;
    }

    /* Block list section */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 2px 0;
    }
    .section-title {
      color: #484f58;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .section-toggle-btn {
      color: #484f58;
      font-size: 11px;
      transition: color 0.15s;
    }
    .section-header:hover .section-title,
    .section-header:hover .section-toggle-btn { color: #8b949e; }

    .blocks-section {
      display: none;
      flex-direction: column;
      gap: 5px;
      margin-top: 10px;
    }

    .block-list-inner {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 130px;
      overflow-y: auto;
    }
    .block-list-inner::-webkit-scrollbar { width: 3px; }
    .block-list-inner::-webkit-scrollbar-track { background: transparent; }
    .block-list-inner::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .block-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      padding: 5px 8px;
    }
    .block-domain { color: #6e7681; font-size: 11px; }
    .btn-remove {
      background: none;
      border: none;
      color: #30363d;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
    }
    .btn-remove:hover { color: #f85149; }

    .add-row {
      display: flex;
      gap: 5px;
      margin-top: 2px;
    }
    .add-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      padding: 5px 8px;
      color: #e6edf3;
      font-size: 11px;
      font-family: inherit;
      outline: none;
    }
    .add-input::placeholder { color: #30363d; }
    .add-input:focus { border-color: rgba(136,176,225,0.25); }

    .btn-add-domain {
      background: rgba(136,176,225,0.12);
      border: none;
      border-radius: 6px;
      padding: 5px 9px;
      color: #88b0e1;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-add-domain:hover { background: rgba(136,176,225,0.22); }

    /* Bottom buttons */
    .btn-quit {
      width: 100%;
      padding: 7px 0;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 8px;
      color: #484f58;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-quit:hover { color: #8b949e; border-color: rgba(255, 255, 255, 0.15); }
  </style>
</head>
<body>
  <div class="icon-wrap" id="icon-wrap">
    <div class="icon-dot">
      <span class="icon-label">RU</span>
    </div>
  </div>

  <div class="card" id="card">
    <div class="score-row">
      <span class="score-label">Locked In</span>
      <span>
        <span class="score-value" id="score">—</span><span class="score-max">/100</span>
      </span>
    </div>
    <div class="score-bar-track">
      <div class="score-bar-fill" id="score-bar" style="width:0%"></div>
    </div>
    <div class="metrics">
      <div class="metric">
        <span class="metric-label">Showed up</span>
        <span class="metric-value"><span id="starts">—</span><span class="metric-unit"> starts</span></span>
      </div>
      <div class="metric">
        <span class="metric-label">Focused</span>
        <span class="metric-value"><span id="minutes">—</span><span class="metric-unit"> min</span></span>
      </div>
      <div class="metric">
        <span class="metric-label">Avg to begin</span>
        <span class="metric-value"><span id="speed">—</span><span class="metric-unit"> sec</span></span>
      </div>
      <div class="metric">
        <span class="metric-label">Bailed</span>
        <span class="metric-value bail-value"><span id="bails">—</span><span class="metric-unit"> times</span></span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-header" id="section-header">
      <span class="section-title">Blocked Sites <span id="block-count"></span></span>
      <span class="section-toggle-btn" id="section-arrow">›</span>
    </div>
    <div class="blocks-section" id="blocks-section">
      <div class="block-list-inner" id="block-list-el"></div>
      <div class="add-row">
        <input class="add-input" id="block-add-input" placeholder="youtube.com" autocomplete="off" />
        <button class="btn-add-domain" id="btn-add-domain">+</button>
      </div>
    </div>

    <div class="divider"></div>
    <button class="btn-quit" id="btn-quit">Quit RU</button>
  </div>

  <script src="status-icon-renderer.js"></script>
</body>
</html>
