<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 16px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .title {
      color: #88b0e1;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-label { color: #6e7681; font-size: 11px; }

    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #30363d;
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      left: 3px;
      top: 3px;
      background: #e6edf3;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider { background: #88b0e1; }
    input:checked + .slider::before { transform: translateX(14px); }

    .block-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
      max-height: 240px;
      overflow-y: auto;
    }

    .block-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(22, 27, 34, 0.8);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 7px;
      padding: 7px 10px;
    }

    .block-domain { color: #8b949e; font-size: 12px; }

    .btn-remove {
      background: none;
      border: none;
      color: #30363d;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
    }
    .btn-remove:hover { color: #f85149; }

    .add-row {
      display: flex;
      gap: 6px;
    }

    .add-input {
      flex: 1;
      background: rgba(22, 27, 34, 0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 7px;
      padding: 7px 10px;
      color: #e6edf3;
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }
    .add-input::placeholder { color: #484f58; }
    .add-input:focus { border-color: rgba(136, 176, 225, 0.3); }

    .btn-add {
      background: #88b0e1;
      border: none;
      border-radius: 7px;
      padding: 7px 12px;
      color: #0d1117;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-add:hover { opacity: 0.85; }

    .status {
      margin-top: 10px;
      font-size: 11px;
      color: #484f58;
      text-align: center;
    }

    .status.connected { color: #3fb950; }
    .status.disconnected { color: #484f58; }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">RU Blocker</span>
    <div class="toggle-wrap">
      <span class="toggle-label" id="toggle-label">on</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-enabled" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="block-list" id="block-list"></div>

  <div class="add-row">
    <input class="add-input" id="add-input" placeholder="add domain (e.g. twitch.tv)" />
    <button class="btn-add" id="btn-add">Add</button>
  </div>

  <div class="status disconnected" id="status">RU app not detected</div>

  <script src="popup.js"></script>
</body>
</html>
