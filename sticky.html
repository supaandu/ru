<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      overflow: hidden;
      width: 260px;
      height: 480px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    /* ── Collapsed tab ── */
    .tab {
      display: flex;
      align-items: center;
      gap: 9px;
      background: rgba(22, 27, 34, 0.93);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      opacity: 0.35;
      transition: opacity 0.4s ease;
      min-width: 60px;
      width: 228px;
    }
    .tab:hover { opacity: 1; }

    .tab-icon { font-size: 15px; line-height: 1; }
    .tab-label {
      color: #8b949e;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .tab-count {
      margin-left: auto;
      background: rgba(136,176,225,0.15);
      color: #88b0e1;
      font-size: 11px;
      font-weight: 600;
      border-radius: 8px;
      padding: 2px 7px;
      min-width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    /* ── Expanded card ── */
    .card {
      display: none;
      flex-direction: column;
      background: rgba(22, 27, 34, 0.96);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      width: 255px;
      max-height: 476px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* drag handle */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      cursor: grab;
      flex-shrink: 0;
    }
    .card-header:active { cursor: grabbing; }
    .card-title {
      color: #484f58;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .btn-collapse {
      background: none;
      border: none;
      color: #484f58;
      font-size: 14px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
    }
    .btn-collapse:hover { color: #8b949e; }

    /* task list */
    .task-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 340px;
    }
    .task-list::-webkit-scrollbar { width: 3px; }
    .task-list::-webkit-scrollbar-track { background: transparent; }
    .task-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: background 0.12s;
    }
    .task-item:hover { background: rgba(255,255,255,0.06); }

    .task-check {
      width: 14px;
      height: 14px;
      border: 1px solid #30363d;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .task-item.done .task-check {
      background: #88b0e1;
      border-color: #88b0e1;
    }
    .task-check-inner {
      display: none;
      color: #0d1117;
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
    }
    .task-item.done .task-check-inner { display: block; }

    .task-text {
      flex: 1;
      color: #8b949e;
      font-size: 13px;
      line-height: 1.3;
      word-break: break-word;
      transition: color 0.15s;
    }
    .task-item.done .task-text {
      color: #30363d;
      text-decoration: line-through;
    }

    .drag-handle {
      color: transparent;
      font-size: 11px;
      cursor: grab;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.15s;
      user-select: none;
    }
    .task-item:hover .drag-handle { color: #30363d; }
    .drag-handle:active { cursor: grabbing; }

    .btn-del {
      background: none;
      border: none;
      color: transparent;
      font-size: 13px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .task-item:hover .btn-del { color: #30363d; }
    .btn-del:hover { color: #f85149 !important; }

    .task-item.drag-over-above {
      box-shadow: 0 -2px 0 #88b0e1;
    }
    .task-item.drag-over-below {
      box-shadow: 0 2px 0 #88b0e1;
    }
    .task-item.dragging-item {
      opacity: 0.4;
    }

    .empty-state {
      text-align: center;
      color: #30363d;
      font-size: 11px;
      padding: 20px 0;
    }

    /* add row */
    .add-row {
      display: flex;
      gap: 5px;
      padding: 8px 10px 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    .add-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 7px;
      padding: 6px 10px;
      color: #e6edf3;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .add-input::placeholder { color: #30363d; }
    .add-input:focus { border-color: rgba(136,176,225,0.25); }
    .btn-add {
      background: rgba(136,176,225,0.12);
      border: none;
      border-radius: 7px;
      padding: 5px 10px;
      color: #88b0e1;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-add:hover { background: rgba(136,176,225,0.22); }
  </style>
</head>
<body>
  <!-- collapsed -->
  <div class="tab" id="tab">
    <span class="tab-icon">✦</span>
    <span class="tab-label" id="tab-label">Tasks</span>
    <span class="tab-count" id="tab-count">0</span>
  </div>

  <!-- expanded -->
  <div class="card" id="card">
    <div class="card-header" id="drag-handle">
      <span class="card-title">Tasks</span>
      <button class="btn-collapse" id="btn-collapse">−</button>
    </div>
    <div class="task-list" id="task-list"></div>
    <div class="add-row">
      <input class="add-input" id="add-input" placeholder="add a task…" autocomplete="off" />
      <button class="btn-add" id="btn-add">+</button>
    </div>
  </div>

  <script src="sticky-renderer.js"></script>
</body>
</html>
